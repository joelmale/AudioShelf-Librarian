name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate changelog
      id: changelog
      run: |
        # Generate changelog from git commits since last tag
        LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        if [ -z "$LAST_TAG" ]; then
          COMMITS=$(git log --oneline --pretty=format:"* %s (%h)" HEAD)
        else
          COMMITS=$(git log --oneline --pretty=format:"* %s (%h)" $LAST_TAG..HEAD)
        fi
        
        echo "## Changes in this release" > RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
        echo "$COMMITS" >> RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
        echo "## Installation" >> RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
        echo "### From Source" >> RELEASE_NOTES.md
        echo '```bash' >> RELEASE_NOTES.md
        echo "wget https://github.com/${{ github.repository }}/archive/${{ github.ref_name }}.tar.gz" >> RELEASE_NOTES.md
        echo "tar -xzf ${{ github.ref_name }}.tar.gz" >> RELEASE_NOTES.md
        echo "cd AudioShelf-Librarian-*" >> RELEASE_NOTES.md
        echo "pip install -r requirements.txt" >> RELEASE_NOTES.md
        echo "python audioshelf-librarian.py web --dev" >> RELEASE_NOTES.md
        echo '```' >> RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
        echo "### Docker" >> RELEASE_NOTES.md
        echo '```bash' >> RELEASE_NOTES.md
        echo "docker run -p 8000:8000 -v /audiobooks:/audiobooks \\$" >> RELEASE_NOTES.md
        echo "  ${{ secrets.DOCKER_USERNAME }}/audioshelf-librarian:${{ github.ref_name }}" >> RELEASE_NOTES.md
        echo '```' >> RELEASE_NOTES.md

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: AudioShelf Librarian ${{ github.ref_name }}
        body_path: RELEASE_NOTES.md
        draft: false
        prerelease: ${{ contains(github.ref_name, '-') }}

  build-assets:
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: audioshelf-librarian-linux-amd64
          - os: windows-latest
            asset_name: audioshelf-librarian-windows-amd64.exe
          - os: macos-latest
            asset_name: audioshelf-librarian-macos-amd64
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build standalone executable
      run: |
        pyinstaller --onefile \
          --name ${{ matrix.asset_name }} \
          --add-data "templates:templates" \
          --add-data "static:static" \
          --hidden-import audioshelf_librarian \
          audioshelf-librarian.py

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./dist/${{ matrix.asset_name }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}
        asset_name: ${{ matrix.asset_name }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}
        asset_content_type: application/octet-stream

  update-docker:
    runs-on: ubuntu-latest
    needs: create-release
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push release Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/audioshelf-librarian:${{ github.ref_name }}
          ${{ secrets.DOCKER_USERNAME }}/audioshelf-librarian:latest
        labels: |
          org.opencontainers.image.version=${{ github.ref_name }}
          org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          org.opencontainers.image.revision=${{ github.sha }}

version: '3.8'

services:
  audioshelf-librarian:
    build: .
    container_name: audioshelf-librarian
    ports:
      - "3050:3050"
    volumes:
      # Mount your audiobook directories
      - /path/to/your/audiobooks:/audiobooks
      - /path/to/your/inbox:/audiobooks/inbox
      # Persistent data directory
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=info
      - PORT=3050
      - ABS_URL=http://audiobookshelf:80
      - ABS_TOKEN=PLACEHOLDER_TOKEN
      - LIBRARY_DIR=/audiobooks
      - INBOX_DIR=/audiobooks/inbox
      - QBITTORRENT_URL=http://qbittorrent:8080
      # You can add ANTHROPIC_API_KEY here if you want to use Curator AI features
    restart: unless-stopped

  # Optional: Run alongside AudioBookShelf if not already running
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    ports:
      - "13378:80"
    volumes:
      - /path/to/your/audiobooks:/audiobooks
      - /path/to/config:/config
      - /path/to/metadata:/metadata
    restart: unless-stopped

networks:
  default:
    name: audioshelf-network

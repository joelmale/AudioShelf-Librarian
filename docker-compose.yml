services:
  audioshelf-librarian:
    image: ghcr.io/joelmale/audioshelf-librarian:latest
    container_name: audioshelf-librarian
    ports:
      - "3050:3050"
    volumes:
      # Mount the actual NAS paths used by ABS and qBittorrent
      - /mnt/audio-nas-vol3/audiobooks:/audiobooks
      - /mnt/audio-nas-vol3/inbox:/inbox
      - /mnt/downloads-nas-vol3/qbittorent:/downloads
      # Persistent data directory
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=info
      - PORT=3050
      # All other configuration is now managed via the Web UI Settings Page!
    restart: unless-stopped
    networks:
      - homelab-net


networks:
  homelab-net:
    external: true

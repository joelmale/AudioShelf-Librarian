services:
  audioshelf-librarian:
    image: ${AUDIOSHELF_IMAGE:-ghcr.io/joelmale/audioshelf-librarian:latest}
    container_name: audioshelf-librarian
    volumes:
      - ${AUDIOBOOKS_PATH:-./audiobooks}:/audiobooks
      - ${INBOX_PATH:-./inbox}:/inbox
      - ${DOWNLOADS_PATH:-./downloads}:/downloads:ro
      - ${DATA_PATH:-./data}:/app/data
      - ${LOG_PATH:-./logs}:/app/logs
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: "3050"
      DB_PATH: /app/data/curator.db
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      WEBHOOK_ENABLED: ${WEBHOOK_ENABLED:-false}
      ABS_SOCKET_ENABLED: ${ABS_SOCKET_ENABLED:-false}
      AUTO_PUSH: ${AUTO_PUSH:-false}
    restart: unless-stopped
    networks: [homelab-net]
    security_opt: [no-new-privileges:true]

networks:
  homelab-net:
    external: true

services:
  audioshelf-librarian:
    build: .
    container_name: audioshelf-librarian
    ports:
      - "3050:3050"
    volumes:
      # Mount the actual NAS paths used by ABS and qBittorrent
      - /mnt/audio-nas-vol3/audiobooks:/audiobooks
      - /mnt/downloads-nas-vol3/qbittorent:/downloads
      # Persistent data directory
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=info
      - PORT=3050
      - ABS_URL=http://abs:80
      - ABS_TOKEN=PLACEHOLDER_TOKEN
      - LIBRARY_DIR=/audiobooks
      - INBOX_DIR=/audiobooks/inbox
      - QBITTORRENT_URL=http://qbittorrent:8080
      # You can add ANTHROPIC_API_KEY here if you want to use Curator AI features
    restart: unless-stopped
    networks:
      - homelab-net


networks:
  homelab-net:
    external: true
